<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback → Jira Tickets</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --border: #2a2a2a;
    --border-active: #444;
    --amber: #f59e0b;
    --amber-dim: #78490a;
    --text: #e8e8e8;
    --text-muted: #888;
    --text-dim: #555;
    --green: #22c55e;
    --red: #ef4444;
    --radius: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo { display: flex; align-items: center; gap: 10px; }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: var(--amber);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #000;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--amber);
    border: 1px solid var(--amber-dim);
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.06em;
  }

  .layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    min-height: calc(100vh - 65px);
  }

  .panel-input {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .panel-label {
    padding: 16px 24px 12px;
    border-bottom: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-label span { color: var(--amber); }

  .input-body {
    padding: 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .field-group { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  textarea, input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    width: 100%;
    transition: border-color 0.15s;
    resize: none;
    outline: none;
  }

  textarea:focus, input:focus { border-color: var(--border-active); }
  textarea { line-height: 1.6; }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .char-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-align: right;
    margin-top: 4px;
  }

  .generate-btn {
    background: var(--amber);
    color: #000;
    border: none;
    border-radius: var(--radius);
    padding: 12px 20px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
  }

  .generate-btn:hover { opacity: 0.9; }
  .generate-btn:active { transform: scale(0.99); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .panel-output { display: flex; flex-direction: column; }

  .output-body {
    flex: 1;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .empty-state {
    height: 100%;
    min-height: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
    text-align: center;
  }

  .empty-icon { font-size: 32px; opacity: 0.3; }
  .empty-state p { font-size: 13px; max-width: 260px; line-height: 1.5; }

  .ticket-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  .ticket {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .ticket-header {
    background: var(--surface);
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .ticket-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--amber);
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .ticket-summary { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    flex-shrink: 0;
  }

  .copy-btn:hover { border-color: var(--amber); color: var(--amber); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .ticket-meta {
    background: #111;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .meta-item { display: flex; align-items: center; gap: 6px; }

  .meta-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'IBM Plex Mono', monospace;
  }

  .meta-value { font-size: 11px; font-weight: 500; color: var(--text-muted); }

  .priority-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

  .ticket-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .ticket-section:last-child { border-bottom: none; }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .section-content { font-size: 13px; color: var(--text); line-height: 1.7; white-space: pre-wrap; }

  .ac-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .ac-list li { display: flex; gap: 10px; font-size: 13px; line-height: 1.5; }

  .ac-check {
    width: 16px;
    height: 16px;
    border: 1px solid var(--border-active);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .refs-list { display: flex; flex-direction: column; gap: 6px; }

  .ref-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }

  .ref-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }

  .error-box {
    background: #1a0a0a;
    border: 1px solid #7f1d1d;
    border-radius: 6px;
    padding: 16px 20px;
    color: #fca5a5;
    font-size: 13px;
    line-height: 1.6;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .panel-input { border-right: none; border-bottom: 1px solid var(--border); }
    header { padding: 16px 20px; }
    .input-body, .output-body { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">FJ</div>
    <span class="logo-text">Feedback → Jira Tickets</span>
  </div>
  <span class="badge">AI-POWERED</span>
</header>

<div class="layout">

  <div class="panel-input">
    <div class="panel-label">Feedback Input <span>01</span></div>
    <div class="input-body">

      <div class="field-group">
        <label>Producer / Client Feedback</label>
        <textarea id="feedback" rows="10" placeholder="Paste raw, conversational feedback here. It can cover multiple unrelated topics — e.g. 'The big win popup logo looks blurry on mobile, also can we get the coin symbol animation a bit punchier on the bounce, and the free spins UI text is overlapping the timer...'"></textarea>
        <div class="char-count"><span id="charCount">0</span> chars</div>
      </div>

      <div class="row-2">
        <div class="field-group">
          <label>Assignee (optional)</label>
          <input type="text" id="assignee" placeholder="Artist name or TBD">
        </div>
        <div class="field-group">
          <label>Sprint (optional)</label>
          <input type="text" id="sprint" placeholder="Sprint 4 / Week 3">
        </div>
      </div>

      <button class="generate-btn" id="generateBtn" onclick="generateTickets()">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Generate Tickets</span>
      </button>

    </div>
  </div>

  <div class="panel-output">
    <div class="panel-label">
      Jira Ticket Output <span id="ticketCountLabel"></span>
    </div>
    <div class="output-body" id="outputBody">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎫</div>
        <p>Paste raw feedback and hit Generate. Each distinct issue becomes its own ticket card below.</p>
      </div>
    </div>
  </div>

</div>

<script>
  const feedbackEl = document.getElementById('feedback');
feedbackEl.addEventListener('input', () => {
  document.getElementById('charCount').textContent = feedbackEl.value.length;
});
  feedbackEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    generateTickets();
  }
});
  const priorityColors = {
    'Critical': '#ef4444',
    'High': '#f97316',
    'Medium': '#f59e0b',
    'Low': '#22c55e'
  };

  let ticketCounter = Math.floor(Math.random() * 900) + 100;

  async function generateTickets() {
    const feedback = feedbackEl.value.trim();
    if (!feedback) { feedbackEl.focus(); return; }

    const assignee = document.getElementById('assignee').value.trim() || 'TBD';
    const sprint = document.getElementById('sprint').value.trim() || 'TBD';

    const btn = document.getElementById('generateBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Generating...';

    const outputBody = document.getElementById('outputBody');

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ feedback })
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        showError(data.error || `Request failed (${res.status})`);
        return;
      }

      const tickets = Array.isArray(data.tickets) ? data.tickets : [];
      if (tickets.length === 0) {
        showError('No tickets could be generated from this feedback.');
        return;
      }

      renderTickets(tickets, { assignee, sprint });

    } catch (err) {
      showError(`Network error: ${err.message}`);
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Generate Tickets';
    }
  }

  function showError(msg) {
    const outputBody = document.getElementById('outputBody');
    outputBody.innerHTML = `<div class="error-box">${escapeHtml(msg)}</div>`;
    document.getElementById('ticketCountLabel').textContent = '';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderTickets(tickets, meta) {
    const outputBody = document.getElementById('outputBody');
    outputBody.innerHTML = '';
    document.getElementById('ticketCountLabel').textContent = `${tickets.length} ticket${tickets.length !== 1 ? 's' : ''}`;

    tickets.forEach(ticket => {
      ticketCounter++;
      const id = `JT-${ticketCounter}`;
      const priority = ticket.priority || 'Medium';
      const type = ticket.type || 'Task';
      const ac = Array.isArray(ticket.acceptance_criteria) ? ticket.acceptance_criteria : [];
      const refs = Array.isArray(ticket.references_needed) ? ticket.references_needed : [];

      const card = document.createElement('div');
      card.className = 'ticket';
      card.innerHTML = `
        <div class="ticket-header">
          <div>
            <div class="ticket-id">${id}</div>
            <div class="ticket-summary"></div>
          </div>
          <button class="copy-btn">Copy</button>
        </div>
        <div class="ticket-meta">
          <div class="meta-item"><span class="meta-label">Type</span><span class="meta-value"></span></div>
          <div class="meta-item"><span class="priority-dot" style="background:${priorityColors[priority] || '#f59e0b'}"></span><span class="meta-label">Priority</span><span class="meta-value"></span></div>
          <div class="meta-item"><span class="meta-label">Assignee</span><span class="meta-value"></span></div>
          <div class="meta-item"><span class="meta-label">Sprint</span><span class="meta-value"></span></div>
        </div>
        <div class="ticket-section">
          <div class="section-label">Description</div>
          <div class="section-content desc"></div>
        </div>
        <div class="ticket-section">
          <div class="section-label">Acceptance Criteria</div>
          <ul class="ac-list"></ul>
        </div>
        ${refs.length > 0 ? `<div class="ticket-section">
          <div class="section-label">References & Assets</div>
          <div class="refs-list"></div>
        </div>` : ''}
      `;

      card.querySelector('.ticket-summary').textContent = ticket.summary || 'Untitled';
      const metaValues = card.querySelectorAll('.meta-value');
      metaValues[0].textContent = type;
      metaValues[1].textContent = priority;
      metaValues[2].textContent = meta.assignee;
      metaValues[3].textContent = meta.sprint;
      card.querySelector('.desc').textContent = ticket.description || '';

      const acList = card.querySelector('.ac-list');
      ac.forEach(item => {
        const li = document.createElement('li');
        const checkDiv = document.createElement('div');
        checkDiv.className = 'ac-check';
        const span = document.createElement('span');
        span.textContent = item;
        li.appendChild(checkDiv);
        li.appendChild(span);
        acList.appendChild(li);
      });

      if (refs.length > 0) {
        const refsList = card.querySelector('.refs-list');
        refs.forEach(ref => {
          const div = document.createElement('div');
          div.className = 'ref-item';
          const dot = document.createElement('div');
          dot.className = 'ref-dot';
          const span = document.createElement('span');
          span.textContent = ref;
          div.appendChild(dot);
          div.appendChild(span);
          refsList.appendChild(div);
        });
      }

      card.querySelector('.copy-btn').addEventListener('click', (e) => {
        copyTicket(id, ticket, type, priority, meta, e.target);
      });

      outputBody.appendChild(card);
    });
  }

  function copyTicket(id, ticket, type, priority, meta, btnEl) {
    const ac = Array.isArray(ticket.acceptance_criteria) ? ticket.acceptance_criteria : [];
    const refs = Array.isArray(ticket.references_needed) ? ticket.references_needed : [];

    const acItems = ac.map((item, i) => `  ${i + 1}. ${item}`).join('\n');
    const refItems = refs.map(r => `  - ${r}`).join('\n');

    const text = `${id} | ${type} | ${priority} | ${meta.assignee} | ${meta.sprint}

SUMMARY
${ticket.summary || ''}

DESCRIPTION
${ticket.description || ''}

ACCEPTANCE CRITERIA
${acItems}

${refItems ? `REFERENCES\n${refItems}` : ''}`.trim();

    navigator.clipboard.writeText(text).then(() => {
      btnEl.textContent = 'Copied ✓';
      btnEl.classList.add('copied');
      setTimeout(() => {
        btnEl.textContent = 'Copy';
        btnEl.classList.remove('copied');
      }, 2000);
    });
  }
</script>
</body>
</html>
